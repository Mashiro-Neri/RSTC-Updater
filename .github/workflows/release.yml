name: Check

on:
  push:
    tags:
      - 'v*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 语法检查
        run: |
          pwsh -NoProfile -Command '
          $errs = $null
          $ast = [System.Management.Automation.Language.Parser]::ParseFile("updater/update_modpack.ps1", [ref]$null, [ref]$errs)
          if ($errs.Count -gt 0) {
            foreach ($e in $errs) { Write-Host "ERROR: $($e.Message)" }
            exit 1
          }
          Write-Host "语法检查通过"
          '
